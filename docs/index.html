<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baking Site</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="cookie.svg">
</head>

<body>

<div class="container">

    <h1>Baking Site</h1>
    <p class="subtitle">
        Tap a category and choose a recipe
    </p>

    <button class="random-recipe random-recipe-mobile">Random Recipe!</button>

    <div class="categories-wrapper">

        <!-- Cookies Column -->
        <div class="category-column">
            <h2>Cookies</h2>

            <a href="recipes/chocolate-chip-cookies.html" class="recipe-link">
                <img src="images/choc_chip_cookies.jpeg" alt="Chocolate Chip">
                <span>Chocolate Chip</span>
            </a>

            <a href="recipes/roll-up-cookies.html" class="recipe-link">
                <img src="images/roll_up_cookies.jpeg" alt="Roll Up">
                <span>Roll Up</span>
            </a>

        </div>

        <!-- Brownies Column -->
        <div class="category-column">
            <h2>Brownies and Bars</h2>

            <a href="recipes/brownie-bites.html" class="recipe-link">
                <img src="images/brownie_bites.jpeg" alt="Brownie Bites">
                <span>Brownie Bites</span></a>

            <a href="recipes/brookie.html" class="recipe-link">
                <img src="images/brookie.jpeg" alt="Brookie">
                <span>Brookie</span></a>

        </div>

        <!-- Pastries Column -->
        <div class="category-column">
            <h2>Pastries</h2>

            <a href="recipes/chocolate-donuts.html" class="recipe-link">
                <img src="images/donuts.jpeg" alt="Chocolate Donuts">
                <span>Chocolate Donuts</span>
            </a>

            <a href="recipes/vanilla-cake.html" class="recipe-link">
                <img src="images/vanilla_cake.jpeg" alt="Vanilla Cake">
                <span>Vanilla Cake </span>
            </a>

        </div>

        <!-- Other Treats Column -->
        <div class="category-column">
            <h2>Other Treats</h2>

            <a href="recipes/macarons.html" class="recipe-link">
                <img src="images/macarons.jpeg" alt="Chocolate Strawberry Macarons">
                <span>Chocolate Strawberry Macarons</span>
            </a>

        </div>

    </div>

    <p class="footer-text">
        Updates are currently baking!
        <br><br>
        <span id="lastUpdated">Last updated: March 18, 2026</span>
    </p>

</div>

<button id="randomRecipe" class="random-recipe">Random Recipe!</button>
<button id="backToTop" class="back-to-top">↑ Top</button>

<script src="script.js"></script>

</body>
</html>
