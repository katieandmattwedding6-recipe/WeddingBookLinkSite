<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Cookie base - dark chocolate -->
  <circle cx="100" cy="100" r="85" fill="#3d2817" stroke="#2a1a0f" stroke-width="3"/>

  <!-- Cookie texture - rough edges -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#2a1a0f" stroke-width="2" opacity="0.3"
          stroke-dasharray="5,3"/>

  <!-- Darker spots for depth -->
  <circle cx="70" cy="75" r="12" fill="#2a1a0f" opacity="0.4"/>
  <circle cx="130" cy="85" r="15" fill="#2a1a0f" opacity="0.3"/>
  <circle cx="95" cy="130" r="10" fill="#2a1a0f" opacity="0.4"/>
  <circle cx="115" cy="115" r="8" fill="#2a1a0f" opacity="0.35"/>
  <circle cx="80" cy="120" r="11" fill="#2a1a0f" opacity="0.3"/>

  <!-- White chocolate chips - scattered around -->
  <ellipse cx="80" cy="50" rx="8" ry="10" fill="#f5f0e8" stroke="#e6dcc8" stroke-width="1.5"
           transform="rotate(-25 80 50)"/>
  <ellipse cx="135" cy="60" rx="7" ry="9" fill="#f5f0e8" stroke="#e6dcc8" stroke-width="1.5"
           transform="rotate(15 135 60)"/>
  <ellipse cx="55" cy="90" rx="9" ry="11" fill="#f5f0e8" stroke="#e6dcc8" stroke-width="1.5"
           transform="rotate(-40 55 90)"/>
  <ellipse cx="145" cy="95" rx="8" ry="10" fill="#f5f0e8" stroke="#e6dcc8" stroke-width="1.5"
           transform="rotate(30 145 95)"/>
  <ellipse cx="100" cy="75" rx="7" ry="8" fill="#f5f0e8" stroke="#e6dcc8" stroke-width="1.5"
           transform="rotate(-10 100 75)"/>
  <ellipse cx="120" cy="125" rx="9" ry="11" fill="#f5f0e8" stroke="#e6dcc8" stroke-width="1.5"
           transform="rotate(20 120 125)"/>
  <ellipse cx="50" cy="120" rx="8" ry="9" fill="#f5f0e8" stroke="#e6dcc8" stroke-width="1.5"
           transform="rotate(-30 50 120)"/>
  <ellipse cx="150" cy="115" rx="7" ry="10" fill="#f5f0e8" stroke="#e6dcc8" stroke-width="1.5"
           transform="rotate(45 150 115)"/>
  <ellipse cx="85" cy="140" rx="8" ry="9" fill="#f5f0e8" stroke="#e6dcc8" stroke-width="1.5"
           transform="rotate(-15 85 140)"/>
  <ellipse cx="40" cy="75" rx="7" ry="9" fill="#f5f0e8" stroke="#e6dcc8" stroke-width="1.5"
           transform="rotate(35 40 75)"/>

  <!-- Highlights on white chips for dimension -->
  <ellipse cx="82" cy="48" rx="3" ry="4" fill="#ffffff" opacity="0.7"
           transform="rotate(-25 82 48)"/>
  <ellipse cx="137" cy="58" rx="2.5" ry="3.5" fill="#ffffff" opacity="0.7"
           transform="rotate(15 137 58)"/>
  <ellipse cx="57" cy="88" rx="3.5" ry="4.5" fill="#ffffff" opacity="0.7"
           transform="rotate(-40 57 88)"/>
  <ellipse cx="147" cy="93" rx="3" ry="4" fill="#ffffff" opacity="0.7"
           transform="rotate(30 147 93)"/>

  <!-- Subtle highlight on cookie edge -->
  <path d="M 30 80 Q 35 60, 50 45 Q 70 30, 100 25"
        fill="none" stroke="#52382a" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
</svg>


